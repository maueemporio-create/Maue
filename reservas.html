<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ver Reservas — Mauê Empório</title>
<style>
  :root {
    --surface-0: #FAF9F6;
    --surface-1: #F1EFE8;
    --surface-2: #FFFFFF;
    --text-primary: #2C2C2A;
    --text-secondary: #5F5E5A;
    --text-muted: #888780;
    --text-danger: #A32D2D;
    --border: #D3D1C7;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--surface-0);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 2rem 1rem;
  }
  button {
    font-family: inherit;
    font-size: 13px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--surface-2);
    padding: 6px 12px;
    cursor: pointer;
  }
  button:hover { background: var(--surface-1); }
  a.back-link {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 14px;
    font-weight: 500;
    margin: 1.5rem 0 8px;
  }
</style>
</head>
<body>

<div style="max-width: 680px; margin: 0 auto;">
  <a class="back-link" href="index.html">&larr; Voltar</a>
  <h1 style="font-size: 22px; font-weight: 500; margin-bottom: 4px;">Reservas — Mauê Empório</h1>
  <p id="status-line" style="font-size:13px; color:var(--text-secondary); margin-top:0;">Carregando reservas...</p>

  <div class="section-title">Esta semana (segunda a domingo)</div>
  <div id="lista-semana" style="display:flex; flex-direction:column; gap:8px;"></div>

  <div class="section-title">Proximas reservas</div>
  <div id="lista-proximas" style="display:flex; flex-direction:column; gap:8px;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIWxnYDtKZJxQGQsv37fN1m_B0frTzgKZ2tZHVjOb8NtH66XgarDNChzhvM2EeaIP83Q/exec";
let reservas = [];

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName = "jsonp_cb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    window[callbackName] = (data) => { resolve(data); cleanup(); };
    function cleanup() {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    }
    const timer = setTimeout(() => { reject(new Error("timeout")); cleanup(); }, 15000);
    script.onerror = () => { reject(new Error("jsonp failed")); cleanup(); };
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
    document.body.appendChild(script);
  });
}

function setStatus(msg) {
  document.getElementById("status-line").textContent = msg;
}

function hoje() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

function segundaDaSemana(base) {
  const d = new Date(base);
  const dia = d.getDay();
  const diff = (dia === 0 ? -6 : 1) - dia;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function domingoDaSemana(segunda) {
  const d = new Date(segunda);
  d.setDate(d.getDate() + 6);
  d.setHours(23, 59, 59, 999);
  return d;
}

function parseData(str) {
  if (!str) return null;
  const partes = String(str).split(/[-\/]/);
  if (partes[0].length === 4) {
    return new Date(Number(partes[0]), Number(partes[1]) - 1, Number(partes[2]));
  }
  return new Date(Number(partes[2]), Number(partes[1]) - 1, Number(partes[0]));
}

function formatarData(d) {
  if (!d) return "";
  const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];
  return dias[d.getDay()] + " " + String(d.getDate()).padStart(2, "0") + "/" + String(d.getMonth() + 1).padStart(2, "0");
}

async function carregarReservas() {
  setStatus("Carregando reservas...");
  try {
    reservas = await jsonp(SCRIPT_URL + "?action=reservas_list");
    render();
  } catch (e) {
    setStatus("Nao foi possivel carregar as reservas.");
    console.error(e);
  }
}

function render() {
  const inicioSemana = segundaDaSemana(hoje());
  const fimSemana = domingoDaSemana(inicioSemana);

  const comData = reservas
    .map(r => ({ ...r, dataObj: parseData(r.data) }))
    .filter(r => r.dataObj);

  const daSemana = comData
    .filter(r => r.dataObj >= inicioSemana && r.dataObj <= fimSemana)
    .sort((a, b) => a.dataObj - b.dataObj || String(a.horario).localeCompare(String(b.horario)));

  const proximas = comData
    .filter(r => r.dataObj > fimSemana)
    .sort((a, b) => a.dataObj - b.dataObj || String(a.horario).localeCompare(String(b.horario)));

  setStatus(daSemana.length + " reserva(s) esta semana, " + proximas.length + " proxima(s)");

  renderLista("lista-semana", daSemana, "Nenhuma reserva para esta semana.");
  renderLista("lista-proximas", proximas, "Nenhuma reserva futura cadastrada.");
}

function renderLista(idContainer, lista, textoVazio) {
  const el = document.getElementById(idContainer);
  if (lista.length === 0) {
    el.innerHTML = '<div style="font-size:13px; color:var(--text-muted); padding:1rem; text-align:center; background:var(--surface-1); border-radius:8px;">' + textoVazio + '</div>';
    return;
  }

  el.innerHTML = lista.map(r => `
    <div style="display:flex; align-items:center; gap:12px; background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:0.75rem 1rem;">
      <div style="text-align:center; min-width:56px;">
        <div style="font-size:14px; font-weight:500;">${formatarData(r.dataObj)}</div>
        <div style="font-size:11px; color:var(--text-secondary);">${r.horario || ""}</div>
      </div>
      <div style="flex:1; min-width:0;">
        <div style="font-size:14px; font-weight:500;">${r.nome}</div>
        <div style="font-size:12px; color:var(--text-secondary);">${r.pessoas || "?"} pessoas ${r.telefone ? "— " + r.telefone : ""}</div>
        ${r.observacoes ? '<div style="font-size:12px; color:var(--text-muted); margin-top:2px;">' + r.observacoes + '</div>' : ""}
      </div>
      <button data-linha="${r.linha}" class="del-btn" style="color:var(--text-danger); border-color:var(--text-danger);">Excluir</button>
    </div>
  `).join("");

  el.querySelectorAll(".del-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Excluir esta reserva?")) return;
      try {
        await jsonp(SCRIPT_URL + "?action=reservas_delete&linha=" + btn.dataset.linha);
        await carregarReservas();
      } catch (e) {
        console.error(e);
      }
    });
  });
}

carregarReservas();
</script>
</body>
</html>
